<h3>Informacje o Aplikacji Spotify Mood Sorter</h3>
<p>Ta aplikacja została stworzona jako projekt na przedmiot Podstawy Aplikacji Internetowych.</p>
<p>Pozwala na (w pełnej wersji) sortowanie utworów z playlist Spotify według nastroju.</p>
<p>Wersja demonstracyjna wykorzystuje predefiniowane dane.</p>
